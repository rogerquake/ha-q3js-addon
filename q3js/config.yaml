---
name: "Q3JS - Quake III Arena"
description: "Run a Quake III Arena server in the browser using QuakeJS. Manages all game containers via Docker Compose."
version: "2.7.4"
slug: "q3js"
url: "https://github.com/rogerquake/ha-q3js-addon"
init: false
arch:
  - amd64
  - aarch64
startup: application
boot: auto
map:
  - share:rw
  - data:rw
docker_api: true
full_access: true
ports:
  8090/tcp: 8090
ports_description:
  8090/tcp: "Metrics HTTP API / Ingress (docker compose manages game ports directly)"
options:
  map_name: "q3dm17"
  gamemode: "baseq3"
  frag_limit: 0
  time_limit: 0
  rcon_password: "homeassistant"
  restart_hours: 0
  ws_port: 27961
  connect_server: ""
  bots:
    - name: "Keel"
      skill: 3
    - name: "Sarge"
      skill: 3
schema:
  map_name: str
  gamemode: str
  frag_limit: int
  time_limit: int
  rcon_password: str
  restart_hours: int
  ws_port: int
  connect_server: str
  bots:
    - name: str
      skill: "int(1,5)"
panel_icon: "mdi:gamepad-variant"
panel_title: "Q3JS"
ingress: true
ingress_port: 8090
